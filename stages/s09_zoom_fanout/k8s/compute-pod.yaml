# Pod template for one frame range. The dispatcher in run.py renders one of
# these per Pod, substituting `frame-start`, `frame-end`, the image tag, and
# the output URL.
#
# Submit a single Pod manually for plumbing tests:
#   kubectl apply -f stages/s09_zoom_fanout/k8s/compute-pod.yaml
# After it completes, that range's chunks land at gs://<bucket>/runs/<id>.zarr/.
#
# The KSA `compute-sa` must be annotated to impersonate the GCP service
# account `mandelflow-compute@<project>.iam.gserviceaccount.com`. Terraform
# binds the IAM side; the K8s side needs:
#
#   kubectl create serviceaccount compute-sa
#   kubectl annotate serviceaccount compute-sa \
#     iam.gke.io/gcp-service-account=mandelflow-compute@<project>.iam.gserviceaccount.com
#
# TODO(s09): bake the KSA + annotation into a Helm chart or kustomization so
# it's reproducible. For first apply, kubectl is fine.

apiVersion: v1
kind: Pod
metadata:
  name: mandelflow-compute-range-0000-0029
  labels:
    app: mandelflow-compute
    range: "0000-0029"
spec:
  serviceAccountName: compute-sa
  restartPolicy: Never

  # GPU pool taint — see terraform/gke.tf
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: present
      effect: NoSchedule

  containers:
    - name: compute
      image: REPLACE_ME-docker.pkg.dev/REPLACE_ME/mandelflow/compute:dev
      command: ["python", "-m", "stages.s09_zoom_fanout.run"]
      args:
        - "--mode=pod"
        - "--frame-start=0"
        - "--frame-end=30"
        - "--n-frames=120"
        - "--resolution=1080"
        - "--max-iter=512"
        - "--output=gs://REPLACE_ME-mandelflow-zarr/runs/dev.zarr"
      resources:
        limits:
          nvidia.com/gpu: 1
          memory: "4Gi"
        requests:
          cpu: "1"
          memory: "2Gi"
      env:
        - name: PYTHONUNBUFFERED
          value: "1"
