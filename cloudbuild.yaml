# Cloud Build config for the mandelflow compute image.
#
# The repo's Dockerfile uses BuildKit syntax (#syntax directive and
# --mount=type=cache for the uv cache layer). Cloud Build's default Docker
# builder doesn't enable BuildKit, so we set DOCKER_BUILDKIT=1 explicitly.
#
# Submit with:
#   gcloud builds submit --config cloudbuild.yaml --region us-central1 .

steps:
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/mandelflow/compute:dev'
      - '.'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/mandelflow/compute:dev'

# Default Cloud Build machine is small (e2-medium). A CUDA image with the
# torch/numba install is ~3GB and takes ~10-15 min on the default. If you
# want faster iteration, uncomment the larger machine:
# options:
#   machineType: E2_HIGHCPU_8

# Build itself takes longer than the default 10-min timeout for first build
# (image layers pull from scratch). 30 min is plenty.
timeout: '1800s'
